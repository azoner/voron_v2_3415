# Hugo site configuration — Voron V2 #3415
# Docs:       https://gohugo.io/getting-started/configuration/
# Theme docs: https://imfing.github.io/hextra/

baseURL: https://example.com/
locale: en-us
title: "Voron V2 #3415"
enableRobotsTXT: true
enableGitInfo: false
hasCJKLanguage: false

# Hextra is consumed as a Hugo Module. `hugo mod get -u` updates it.
module:
  imports:
    - path: github.com/imfing/hextra

# Allow raw HTML in markdown (Hextra shortcodes need it).
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
  tableOfContents:
    startLevel: 2
    endLevel: 4

# Top-of-page navigation. Sidebar is auto-generated from the content tree.
menu:
  main:
    - identifier: build
      name: Build
      pageRef: /build
      weight: 1
    - identifier: config
      name: Config
      pageRef: /config
      weight: 2
    - identifier: usage
      name: Usage
      pageRef: /usage
      weight: 3
    - identifier: maintenance
      name: Maintenance
      pageRef: /maintenance
      weight: 4
    - identifier: plans
      name: Plans
      pageRef: /plans
      weight: 5
    - identifier: notes
      name: Notes
      pageRef: /notes
      weight: 6

params:
  description: "Build journal, Klipper config, and operating notes for Voron V2 serial #3415."

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/voron-hex.svg
      link: /
      width: 24
      height: 24
      # Same SVG for light + dark — the hex is dark-mode safe.
      dark: images/voron-hex.svg

  theme:
    # 'dark' fits a printer-themed palette; user can switch via the toggle.
    default: dark
    displayToggle: true

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false

  # Full-text client-side search.
  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content

  # Hide "Edit this page" until the GitHub repo URL exists.
  editURL:
    enable: false

  # Inject assets/css/custom.css — the one file the palette lives in.
  customCSS:
    - css/custom.css
